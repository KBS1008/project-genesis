<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Genesis</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="layout">
      <header class="header">
        <div>
          <p class="eyebrow">Deterministic Economy Simulation</p>
          <h1>Project Genesis</h1>
        </div>
        <div class="header-meta">
          <span id="tick-label">Tick —</span>
          <span id="time-label">Time —</span>
        </div>
      </header>

      <section class="toolbar card">
        <div class="toolbar-group">
          <span class="toolbar-label">Session</span>
          <button id="new-game-btn" type="button">Neues Spiel</button>
          <button id="save-btn" type="button">Speichern</button>
          <button id="load-btn" type="button">Laden</button>
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">Simulation</span>
          <button id="tick-btn" type="button">Simulation Tick</button>
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">Bauen</span>
          <button id="place-sawmill-btn" type="button">Sägewerk bauen</button>
          <button id="place-warehouse-btn" type="button">Lager bauen</button>
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">Produktion</span>
          <button id="start-planks-btn" type="button">Bretter produzieren</button>
          <button id="start-advanced-planks-btn" type="button">Premium-Bretter</button>
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">Markt</span>
          <button id="sell-wood-btn" type="button">5× Holz verkaufen</button>
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">Forschung</span>
          <button id="start-woodworking-btn" type="button">Holzbearbeitung</button>
        </div>
        <p id="status-message" class="status-message" aria-live="polite"></p>
      </section>

      <main class="grid">
        <section class="card">
          <h2>Firma</h2>
          <dl id="company-panel" class="kv"></dl>
        </section>

        <section class="card">
          <h2>Finanzen</h2>
          <dl id="finance-panel" class="kv"></dl>
        </section>

        <section class="card">
          <h2>Inventar</h2>
          <div id="inventory-panel" class="table-wrap"></div>
        </section>

        <section class="card span-2">
          <h2>Gebäude</h2>
          <div id="buildings-panel" class="table-wrap"></div>
        </section>

        <section class="card">
          <h2>Produktion</h2>
          <div id="production-panel" class="table-wrap"></div>
        </section>

        <section class="card">
          <h2>Forschung</h2>
          <div id="research-panel" class="table-wrap"></div>
        </section>

        <section class="card">
          <h2>Marktpreise</h2>
          <div id="market-panel" class="table-wrap"></div>
        </section>

        <section class="card span-2">
          <h2>Meilensteine</h2>
          <ul id="milestones-panel" class="milestone-list"></ul>
        </section>
      </main>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
